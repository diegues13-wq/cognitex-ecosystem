name: Deploy Terra Landing → Netlify (www.terralatitude.com)

on:
  push:
    branches: ["main"]
    paths:
      - "terra-landing/**"
      - ".github/workflows/deploy-terra-landing.yaml"
  workflow_dispatch:           # Permite lanzar el deploy manualmente

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. Obtener el código
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      # 2. Configurar Node con caché de npm
      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: terra-landing/package-lock.json

      # 3. Instalar dependencias (usando lockfile exacto)
      - name: 📦 Install dependencies
        working-directory: ./terra-landing
        run: npm ci

      # 4. Compilar para producción
      - name: 🏗️ Build
        working-directory: ./terra-landing
        run: npm run build

      # 5. Desplegar a Netlify
      - name: 🚀 Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir:      "./terra-landing/dist"
          production-branch: main
          github-token:      ${{ secrets.GITHUB_TOKEN }}
          deploy-message:    "🌿 Deploy #${{ github.run_number }} — ${{ github.sha }}"
          enable-pull-request-comment: false
          enable-commit-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID:    ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 5
