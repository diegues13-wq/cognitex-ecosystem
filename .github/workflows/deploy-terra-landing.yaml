name: Deploy Terra Landing → Cloudflare Pages (www.terralatitude.com)

# ┌─────────────────────────────────────────────────────────────┐
# │  NOTA: Cloudflare Pages ya tiene CI/CD nativo con GitHub.  │
# │  Este workflow es OPCIONAL y sirve para:                    │
# │  - Tener logs de build en GitHub Actions                    │
# │  - Deploy manual desde GitHub ("workflow_dispatch")         │
# │  - Notificaciones/integraciones personalizadas              │
# └─────────────────────────────────────────────────────────────┘

on:
  push:
    branches: ["main"]
    paths:
      - "terra-landing/**"
      - ".github/workflows/deploy-terra-landing.yaml"
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to Cloudflare Pages
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: terra-landing/package-lock.json

      - name: 📦 Install dependencies
        working-directory: ./terra-landing
        run: npm ci

      - name: 🏗️ Build
        working-directory: ./terra-landing
        run: npm run build

      # Deploy a Cloudflare Pages usando Wrangler
      - name: 🚀 Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./terra-landing/dist --project-name=terra-landing --branch=main
